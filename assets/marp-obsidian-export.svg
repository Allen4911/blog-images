<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" width="1100" height="520">
  <defs>
    <linearGradient id="bgo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="obsG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5b21b6"/><stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="guiG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0e7490"/><stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="expG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b45309"/><stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="oPpt" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#c2410c"/><stop offset="100%" style="stop-color:#ea580c"/></linearGradient>
    <linearGradient id="oPdf" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#b91c1c"/><stop offset="100%" style="stop-color:#dc2626"/></linearGradient>
    <linearGradient id="oHtml" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#15803d"/><stop offset="100%" style="stop-color:#16a34a"/></linearGradient>
    <marker id="oah" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#475569"/></marker>
    <marker id="oahg" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#f59e0b"/></marker>
  </defs>

  <rect width="1100" height="520" fill="url(#bgo)" rx="16"/>
  <rect width="1100" height="520" fill="none" stroke="#1e293b" stroke-width="2" rx="16"/>

  <text x="550" y="45" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">Obsidian에서 Marp 내보내기</text>
  <text x="550" y="68" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#64748b">터미널(CLI) 없이, Obsidian GUI만으로 슬라이드를 만들고 내보냅니다.</text>

  <!-- STAGE 1: Install plugin -->
  <rect x="40" y="100" width="280" height="320" rx="12" fill="url(#obsG)" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="180" y="128" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="700" fill="#c4b5fd" letter-spacing="2">STEP 1</text>
  <text x="180" y="152" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="700" fill="#f9fafb">플러그인 설치</text>
  <line x1="66" y1="166" x2="294" y2="166" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
  <text x="180" y="192" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="700" fill="#ede9fe">⬡ Obsidian</text>
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#ede9fe">
    <text x="66" y="226">⚙️  설정 → 커뮤니티</text>
    <text x="66" y="248">      플러그인</text>
    <text x="66" y="282">🔍  "Marp" 검색</text>
    <text x="66" y="316">⬇️  설치</text>
    <text x="66" y="348">✅  활성화 (Enable)</text>
  </g>
  <rect x="60" y="372" width="240" height="32" rx="6" fill="#4c1d95" opacity="0.7"/>
  <text x="180" y="393" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#ddd6fe">Marp for Obsidian</text>

  <!-- Arrow 1->2 -->
  <line x1="325" y1="260" x2="380" y2="260" stroke="#475569" stroke-width="2.5" marker-end="url(#oah)"/>
  <text x="352" y="250" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#64748b">열기</text>

  <!-- STAGE 2: GUI preview -->
  <rect x="390" y="100" width="320" height="320" rx="12" fill="url(#guiG)" stroke="#0891b2" stroke-width="1.5"/>
  <text x="550" y="128" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="700" fill="#a5f3fc" letter-spacing="2">STEP 2</text>
  <text x="550" y="152" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="700" fill="#f9fafb">GUI 미리보기</text>
  <line x1="416" y1="166" x2="684" y2="166" stroke="#67e8f9" stroke-width="1" opacity="0.4"/>
  <!-- editor pane -->
  <rect x="410" y="182" width="138" height="170" rx="6" fill="#0b1220"/>
  <text x="420" y="200" font-family="'Courier New', monospace" font-size="10" fill="#67e8f9">---</text>
  <text x="420" y="216" font-family="'Courier New', monospace" font-size="10" fill="#a5f3fc">marp: true</text>
  <text x="420" y="232" font-family="'Courier New', monospace" font-size="10" fill="#67e8f9">---</text>
  <text x="420" y="252" font-family="'Courier New', monospace" font-size="10" fill="#e2e8f0"># 제목</text>
  <text x="420" y="270" font-family="'Courier New', monospace" font-size="10" fill="#f59e0b">---</text>
  <text x="420" y="288" font-family="'Courier New', monospace" font-size="10" fill="#e2e8f0"># 다음장</text>
  <text x="420" y="306" font-family="'Courier New', monospace" font-size="10" fill="#94a3b8">- 요점</text>
  <text x="479" y="342" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#67e8f9">편집창 (.md)</text>
  <!-- preview pane -->
  <rect x="556" y="182" width="138" height="78" rx="6" fill="#ffffff"/>
  <text x="568" y="212" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="700" fill="#0f172a">제목</text>
  <line x1="568" y1="222" x2="610" y2="222" stroke="#0891b2" stroke-width="2"/>
  <text x="682" y="250" text-anchor="end" font-family="'Courier New', monospace" font-size="9" fill="#94a3b8">1</text>
  <rect x="556" y="268" width="138" height="78" rx="6" fill="#ffffff"/>
  <text x="568" y="296" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="700" fill="#0f172a">다음장</text>
  <text x="568" y="318" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#475569">• 요점</text>
  <text x="682" y="338" text-anchor="end" font-family="'Courier New', monospace" font-size="9" fill="#94a3b8">2</text>
  <text x="625" y="342" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#cffafe">실시간 미리보기</text>

  <!-- Arrow 2->3 -->
  <line x1="715" y1="260" x2="770" y2="260" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#oahg)"/>
  <text x="742" y="250" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#f59e0b">Export</text>

  <!-- STAGE 3: Export -->
  <rect x="780" y="100" width="280" height="320" rx="12" fill="url(#expG)" stroke="#d97706" stroke-width="1.5"/>
  <text x="920" y="128" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="700" fill="#fde68a" letter-spacing="2">STEP 3</text>
  <text x="920" y="152" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="700" fill="#f9fafb">Export로 내보내기</text>
  <line x1="806" y1="166" x2="1034" y2="166" stroke="#fbbf24" stroke-width="1" opacity="0.4"/>
  <rect x="800" y="182" width="240" height="34" rx="6" fill="#92400e" opacity="0.7"/>
  <text x="920" y="204" text-anchor="middle" font-family="'Courier New', monospace" font-size="11.5" fill="#fbbf24">Marp: Export Slide Deck</text>
  <text x="920" y="240" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#fef3c7">명령 팔레트에서 선택 → 포맷 고르기</text>
  <!-- output chips -->
  <rect x="800" y="258" width="240" height="40" rx="8" fill="url(#oPpt)"/>
  <text x="820" y="283" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="700" fill="#ffffff">📊 PPTX</text>
  <text x="1020" y="283" text-anchor="end" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#fed7aa">파워포인트</text>
  <rect x="800" y="306" width="240" height="40" rx="8" fill="url(#oPdf)"/>
  <text x="820" y="331" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="700" fill="#ffffff">📄 PDF</text>
  <text x="1020" y="331" text-anchor="end" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#fecaca">인쇄·배포</text>
  <rect x="800" y="354" width="240" height="40" rx="8" fill="url(#oHtml)"/>
  <text x="820" y="379" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="700" fill="#ffffff">🌐 HTML</text>
  <text x="1020" y="379" text-anchor="end" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#dcfce7">웹·발표</text>

  <text x="550" y="450" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#64748b">설치는 한 번뿐 — 이후엔 글 쓰듯 편집하고, 미리보기로 확인한 뒤 원하는 포맷으로 내보내면 됩니다.</text>
  <text x="550" y="480" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#7c3aed">CLI가 부담스러운 초보자에게 가장 쉬운 Marp 시작법</text>
</svg>

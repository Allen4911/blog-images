<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" width="1100" height="560">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="srcG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0e7490"/><stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <marker id="ah2" markerWidth="13" markerHeight="9" refX="11" refY="4.5" orient="auto"><polygon points="0 0, 13 4.5, 0 9" fill="#f59e0b"/></marker>
  </defs>

  <rect width="1100" height="560" fill="url(#bg2)" rx="16"/>
  <rect width="1100" height="560" fill="none" stroke="#1e293b" stroke-width="2" rx="16"/>

  <text x="550" y="44" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">슬라이드 구조: <tspan font-family="'Courier New', monospace" fill="#f59e0b">---</tspan> 로 페이지를 나눈다</text>
  <text x="550" y="67" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#64748b">맨 위 ---는 설정(front-matter), 그다음 ---마다 새 슬라이드가 시작됩니다.</text>

  <!-- LEFT: Markdown source -->
  <rect x="40" y="95" width="430" height="430" rx="12" fill="#0b1220" stroke="#0891b2" stroke-width="1.5"/>
  <rect x="40" y="95" width="430" height="34" rx="12" fill="url(#srcG)"/>
  <rect x="40" y="113" width="430" height="16" fill="#0b1220"/>
  <text x="60" y="118" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="700" fill="#f9fafb">📝 slides.md</text>

  <!-- front-matter block highlight -->
  <rect x="56" y="142" width="398" height="84" rx="6" fill="#92400e" opacity="0.18"/>
  <g font-family="'Courier New', monospace" font-size="14">
    <text x="68" y="164" fill="#f59e0b" font-weight="700">---</text>
    <text x="68" y="186" fill="#a5f3fc">marp: true</text>
    <text x="68" y="208" fill="#a5f3fc">theme: default</text>
    <text x="68" y="230" fill="#f59e0b" font-weight="700">---</text>
    <text x="318" y="175" fill="#fbbf24" font-size="11">← 설정 블록</text>
    <text x="318" y="221" fill="#fbbf24" font-size="11">(front-matter)</text>

    <text x="68" y="262" fill="#e2e8f0"># Slide 1</text>
    <text x="68" y="284" fill="#94a3b8">첫 번째 슬라이드</text>

    <text x="68" y="318" fill="#f59e0b" font-weight="700">---</text>
    <text x="318" y="318" fill="#fbbf24" font-size="11">← 슬라이드 구분</text>

    <text x="68" y="350" fill="#e2e8f0"># Slide 2</text>
    <text x="68" y="372" fill="#94a3b8">- 요점 A</text>
    <text x="68" y="394" fill="#94a3b8">- 요점 B</text>

    <text x="68" y="428" fill="#f59e0b" font-weight="700">---</text>
    <text x="318" y="428" fill="#fbbf24" font-size="11">← 슬라이드 구분</text>

    <text x="68" y="460" fill="#e2e8f0"># Slide 3</text>
    <text x="68" y="482" fill="#94a3b8">감사합니다 🙏</text>
  </g>

  <!-- Arrow -->
  <line x1="485" y1="300" x2="560" y2="300" stroke="#f59e0b" stroke-width="3" marker-end="url(#ah2)"/>
  <text x="522" y="290" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#f59e0b">marp</text>

  <!-- RIGHT: rendered slides -->
  <text x="820" y="118" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="700" fill="#94a3b8" letter-spacing="2">렌더링 결과 — 3장</text>

  <!-- Slide 1 -->
  <rect x="600" y="140" width="440" height="118" rx="8" fill="#f8fafc" stroke="#7c3aed" stroke-width="2"/>
  <text x="624" y="190" font-family="'Segoe UI', system-ui, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Slide 1</text>
  <text x="624" y="220" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="#475569">첫 번째 슬라이드</text>
  <text x="1018" y="250" text-anchor="end" font-family="'Courier New', monospace" font-size="11" fill="#94a3b8">1</text>

  <!-- Slide 2 -->
  <rect x="600" y="272" width="440" height="118" rx="8" fill="#f8fafc" stroke="#7c3aed" stroke-width="2"/>
  <text x="624" y="312" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Slide 2</text>
  <text x="624" y="340" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="#475569">•  요점 A</text>
  <text x="624" y="362" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="#475569">•  요점 B</text>
  <text x="1018" y="382" text-anchor="end" font-family="'Courier New', monospace" font-size="11" fill="#94a3b8">2</text>

  <!-- Slide 3 -->
  <rect x="600" y="404" width="440" height="118" rx="8" fill="#f8fafc" stroke="#7c3aed" stroke-width="2"/>
  <text x="624" y="448" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Slide 3</text>
  <text x="624" y="478" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="#475569">감사합니다 🙏</text>
  <text x="1018" y="514" text-anchor="end" font-family="'Courier New', monospace" font-size="11" fill="#94a3b8">3</text>

  <text x="550" y="548" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#64748b">핵심: 첫 <tspan font-family="'Courier New', monospace" fill="#f59e0b">---</tspan> 쌍은 설정, 이후의 <tspan font-family="'Courier New', monospace" fill="#f59e0b">---</tspan>는 페이지 나누기입니다.</text>
</svg>

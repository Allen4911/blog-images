  <line x1="840" y1="180" x2="740" y2="255" stroke="#d97706" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrS)"/>
  <text x="810" y="218" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#6e7681">증강 처리</text>

  <!-- Git → 중앙 -->
  <line x1="360" y1="450" x2="460" y2="310" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrS)"/>
  <text x="400" y="390" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#6e7681">버전 관리</text>

  <!-- 중앙 → Quartz (강조) -->
  <line x1="740" y1="310" x2="840" y2="430" stroke="#0891b2" stroke-width="2" marker-end="url(#arrSBlue)"/>
  <text x="820" y="378" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#0891b2">퍼블리시</text>


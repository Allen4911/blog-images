  <!-- 좌상단: Obsidian -->
  <rect x="60" y="80" width="300" height="160" rx="14" fill="#1a0d2e" stroke="#7c3aed" stroke-width="2"/>
  <rect x="60" y="80" width="300" height="44" rx="14" fill="#4c1d95" opacity="0.5"/>
  <text x="210" y="108" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"

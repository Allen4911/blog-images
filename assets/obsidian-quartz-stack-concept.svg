  <text x="860" y="498" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="12" fill="#a5f3fc">• GitHub Pages 자동 배포</text>

  <!-- 연결선 (Obsidian → 중앙) -->
  <line x1="360" y1="180" x2="460" y2="255" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrS)"/>
  <text x="400" y="218" text-anchor="middle"

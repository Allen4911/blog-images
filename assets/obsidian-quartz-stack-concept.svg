        font-size="11" fill="#6e7681">협업 · 편집</text>

  <!-- Git ↔ LLM (세로) -->
  <line x1="990" y1="240" x2="990" y2="370" stroke="#484f58" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="1010" y="310" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#6e7681">커밋</text>

  <!-- Obsidian ↔ Git (세로) -->
  <line x1="210" y1="240" x2="210" y2="370" stroke="#484f58" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="225" y="310" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#6e7681">sync</text>

  <!-- 하단 -->
  <line x1="60" y1="550" x2="1140" y2="550" stroke="#21262d" stroke-width="1"/>
  <text x="600" y="570" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="12" fill="#30363d">Allen · privatelabs.io</text>

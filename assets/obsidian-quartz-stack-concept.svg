      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <marker id="arrS" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#484f58"/>
    </marker>
    <marker id="arrSBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0891b2"/>
    </marker>
  </defs>

  <rect width="1200" height="580" fill="url(#bgS)"/>
  <rect x="0" y="0" width="1200" height="3" fill="#0891b2" opacity="0.8"/>

  <text x="600" y="48" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="22" font-weight="700" fill="#f0f6fc">전체 스택 개념도: 4+1 레이어 관계</text>
  <line x1="60" y1="62" x2="1140" y2="62" stroke="#21262d" stroke-width="1.5"/>

  <!-- 중앙 핵심 박스 -->
  <rect x="460" y="220" width="280" height="100" rx="16" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="600" y="262" text-anchor="middle"

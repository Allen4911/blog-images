<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <linearGradient id="bgH" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="quartzGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0e7490;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="500" fill="url(#bgH)"/>

  <!-- 상단 장식선 -->
  <rect x="0" y="0" width="1200" height="3" fill="#0891b2" opacity="0.8"/>

  <!-- 제목 영역 -->
  <text x="600" y="75" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="36" font-weight="700" fill="#f0f6fc">개인 지식관리 자동화</text>
  <text x="600" y="115" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="17" fill="#8b949e">노트가 공개 지식 자산이 되는 4+1 스택</text>

  <!-- 구분선 -->
  <line x1="200" y1="135" x2="1000" y2="135" stroke="#21262d" stroke-width="1"/>

  <!-- 카드 4개 (Obsidian / LLM / Git / Quartz) -->
  <!-- Obsidian -->
  <rect x="60" y="158" width="230" height="200" rx="14" fill="#1a0d2e" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="60" y="158" width="230" height="50" rx="14" fill="#4c1d95" opacity="0.5"/>
  <text x="175" y="190" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="18" font-weight="700" fill="#a78bfa">Obsidian</text>
  <text x="175" y="235" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="13" fill="#c4b5fd">입력 · 작성 레이어</text>
  <text x="80" y="265" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="12" fill="#8b949e">→ 마크다운 노트</text>
  <text x="80" y="283" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="12" fill="#8b949e">→ 양방향 링크</text>
  <text x="80" y="301" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="12" fill="#8b949e">→ 로컬 Vault 저장</text>
  <text x="80" y="319" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="12" fill="#8b949e">→ 플러그인 생태계</text>
  <text x="80" y="342" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#6e7681">✦ 지식 수집 기반</text>

  <!-- LLM (Claude) -->
  <rect x="320" y="158" width="230" height="200" rx="14" fill="#1c1200" stroke="#d97706" stroke-width="1.5"/>
  <rect x="320" y="158" width="230" height="50" rx="14" fill="#92400e" opacity="0.5"/>
  <text x="435" y="190" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="18" font-weight="700" fill="#fbbf24">LLM / Claude</text>
  <text x="435" y="235" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="13" fill="#fde68a">증강 · 처리 레이어</text>
  <text x="340" y="265" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="12" fill="#8b949e">→ 노트 요약 · 정제</text>
  <text x="340" y="283" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="12" fill="#8b949e">→ 태그 자동 생성</text>
  <text x="340" y="301" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="12" fill="#8b949e">→ 연관 노트 추천</text>
  <text x="340" y="319" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="12" fill="#8b949e">→ Claude Code CLI</text>
  <text x="340" y="342" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#6e7681">✦ 지식 증폭 엔진</text>

  <!-- Git -->
  <rect x="580" y="158" width="230" height="200" rx="14" fill="#1a0505" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="580" y="158" width="230" height="50" rx="14" fill="#7f1d1d" opacity="0.5"/>
  <text x="695" y="190" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="18" font-weight="700" fill="#f87171">Git</text>
  <text x="695" y="235" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="13" fill="#fca5a5">버전 · 동기 레이어</text>
  <text x="600" y="265" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="12" fill="#8b949e">→ 변경 이력 추적</text>
  <text x="600" y="283" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="12" fill="#8b949e">→ GitHub 원격 백업</text>
  <text x="600" y="301" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="12" fill="#8b949e">→ 멀티 디바이스 동기</text>
  <text x="600" y="319" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="12" fill="#8b949e">→ 브랜치 실험</text>
  <text x="600" y="342" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#6e7681">✦ 지식 영속성 보장</text>

  <!-- Quartz (강조) -->
  <rect x="840" y="148" width="300" height="220" rx="14" fill="url(#quartzGlow)" stroke="#0891b2" stroke-width="2.5"/>
  <rect x="840" y="148" width="300" height="50" rx="14" fill="#0891b2" opacity="0.4"/>
  <!-- Quartz 강조 뱃지 -->
  <rect x="910" y="136" width="160" height="24" rx="12" fill="#0891b2"/>
  <text x="990" y="152" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" font-weight="700" fill="#ffffff">✦ 이 스택의 핵심</text>
  <text x="990" y="185" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="20" font-weight="700" fill="#22d3ee">Quartz</text>
  <text x="990" y="228" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="13" fill="#67e8f9">공개 · 배포 레이어</text>
  <text x="860" y="258" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="12" fill="#a5f3fc">→ 정적 사이트 빌드</text>
  <text x="860" y="276" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="12" fill="#a5f3fc">→ 그래프 시각화</text>
  <text x="860" y="294" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="12" fill="#a5f3fc">→ GitHub Pages 배포</text>
  <text x="860" y="312" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="12" fill="#a5f3fc">→ 검색 · SEO</text>
  <text x="860" y="350" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#22d3ee">✦ 노트 → 공개 지식 자산</text>

  <!-- 화살표 (카드 간) -->
  <text x="299" y="262" text-anchor="middle" font-size="22" fill="#484f58">→</text>
  <text x="559" y="262" text-anchor="middle" font-size="22" fill="#484f58">→</text>
  <text x="819" y="262" text-anchor="middle" font-size="22" fill="#0891b2">→</text>

  <!-- 하단 태그라인 -->
  <line x1="60" y1="400" x2="1140" y2="400" stroke="#21262d" stroke-width="1"/>
  <text x="600" y="432" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="15" fill="#6e7681">로컬에서 시작해 웹으로 퍼블리시되는 개인 지식 관리 스택</text>
  <text x="600" y="460" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="13" fill="#30363d">Allen · privatelabs.io</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" width="1100" height="520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="mdG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0e7490"/><stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="cliG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b45309"/><stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="pdfG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b91c1c"/><stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="pptG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c2410c"/><stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="htmlG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5b21b6"/><stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <marker id="ah" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#475569"/></marker>
    <marker id="ahg" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#f59e0b"/></marker>
  </defs>

  <rect width="1100" height="520" fill="url(#bg)" rx="16"/>
  <rect width="1100" height="520" fill="none" stroke="#1e293b" stroke-width="2" rx="16"/>

  <text x="550" y="45" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">The Marp Workflow</text>
  <text x="550" y="68" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#64748b">하나의 마크다운 원본이 marp-cli를 거쳐 세 가지 포맷으로 나옵니다.</text>

  <!-- STAGE 1: Markdown -->
  <rect x="40" y="120" width="300" height="290" rx="12" fill="url(#mdG)" stroke="#0891b2" stroke-width="1.5"/>
  <text x="190" y="148" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="700" fill="#a5f3fc" letter-spacing="2">INPUT</text>
  <text x="190" y="172" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="700" fill="#f9fafb">slides.md</text>
  <line x1="70" y1="186" x2="310" y2="186" stroke="#0891b2" stroke-width="1" opacity="0.4"/>
  <g font-family="'Courier New', monospace" font-size="13" fill="#a5f3fc">
    <text x="64" y="214">---</text>
    <text x="64" y="236">marp: true</text>
    <text x="64" y="258">theme: default</text>
    <text x="64" y="280">---</text>
    <text x="64" y="306"># Slide 1</text>
    <text x="64" y="328">내용...</text>
    <text x="64" y="350">---</text>
    <text x="64" y="372"># Slide 2</text>
  </g>
  <text x="190" y="398" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#67e8f9">그냥 마크다운 — 어디서나 읽힘</text>

  <!-- Arrow 1->2 -->
  <line x1="345" y1="265" x2="410" y2="265" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#ahg)"/>
  <text x="377" y="255" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#f59e0b">convert</text>

  <!-- STAGE 2: marp-cli -->
  <rect x="420" y="160" width="240" height="210" rx="12" fill="url(#cliG)" stroke="#d97706" stroke-width="1.5"/>
  <text x="540" y="190" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="700" fill="#fde68a" letter-spacing="2">ENGINE</text>
  <text x="540" y="216" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="700" fill="#f9fafb">⚙ marp-cli</text>
  <line x1="450" y1="232" x2="630" y2="232" stroke="#d97706" stroke-width="1" opacity="0.4"/>
  <rect x="445" y="248" width="190" height="30" rx="6" fill="#92400e" opacity="0.6"/>
  <text x="540" y="268" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#fbbf24">marp slides.md</text>
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#fef3c7">
    <text x="455" y="302">📑  슬라이드 렌더링</text>
    <text x="455" y="324">🎨  테마·CSS 적용</text>
    <text x="455" y="346">👁  --watch 실시간</text>
  </g>

  <!-- Arrows 2->3 (fan out) -->
  <line x1="665" y1="220" x2="745" y2="180" stroke="#475569" stroke-width="2.5" marker-end="url(#ah)"/>
  <line x1="665" y1="265" x2="745" y2="265" stroke="#475569" stroke-width="2.5" marker-end="url(#ah)"/>
  <line x1="665" y1="310" x2="745" y2="350" stroke="#475569" stroke-width="2.5" marker-end="url(#ah)"/>

  <!-- STAGE 3: Outputs -->
  <text x="900" y="110" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="700" fill="#94a3b8" letter-spacing="2">OUTPUT</text>

  <rect x="755" y="135" width="305" height="80" rx="12" fill="url(#pdfG)" stroke="#dc2626" stroke-width="1.5"/>
  <text x="785" y="180" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff">📄 PDF</text>
  <text x="905" y="172" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#fecaca">인쇄·배포용</text>
  <text x="905" y="192" font-family="'Courier New', monospace" font-size="11" fill="#fecaca">--pdf</text>

  <rect x="755" y="228" width="305" height="80" rx="12" fill="url(#pptG)" stroke="#ea580c" stroke-width="1.5"/>
  <text x="785" y="273" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff">📊 PPTX</text>
  <text x="905" y="265" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#fed7aa">파워포인트 편집</text>
  <text x="905" y="285" font-family="'Courier New', monospace" font-size="11" fill="#fed7aa">--pptx</text>

  <rect x="755" y="321" width="305" height="80" rx="12" fill="url(#htmlG)" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="785" y="366" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff">🌐 HTML</text>
  <text x="905" y="358" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#ddd6fe">웹·발표 모드</text>
  <text x="905" y="378" font-family="'Courier New', monospace" font-size="11" fill="#ddd6fe">--html</text>

  <text x="550" y="450" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#64748b">원본은 그대로 두고, 필요한 포맷만 골라 내보냅니다 — 텍스트라 Git 버전 관리도 자연스럽습니다.</text>
  <text x="550" y="478" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#7c3aed">npm i -g @marp-team/marp-cli  →  marp slides.md --pdf --pptx --html</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560">
  <defs>
    <linearGradient id="bgP" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <marker id="arrP" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#0891b2"/>
    </marker>
    <marker id="arrPG" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#22c55e"/>
    </marker>
  </defs>

  <rect width="1200" height="560" fill="url(#bgP)"/>
  <rect x="0" y="0" width="1200" height="3" fill="#0891b2" opacity="0.9"/>

  <text x="600" y="48" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="22" font-weight="700" fill="#f0f6fc">Quartz 배포 파이프라인</text>
  <text x="600" y="72" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="14" fill="#8b949e">노트 한 줄 → 웹 공개까지 자동으로</text>
  <line x1="60" y1="88" x2="1140" y2="88" stroke="#21262d" stroke-width="1.5"/>

  <!-- 파이프라인 흐름: 가로 6단계 -->

  <!-- STEP 1: Obsidian Vault -->
  <rect x="40" y="115" width="155" height="270" rx="12" fill="#1a0d2e" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="40" y="115" width="155" height="38" rx="12" fill="#4c1d95" opacity="0.6"/>
  <text x="118" y="140" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="12" font-weight="700" fill="#a78bfa">Obsidian Vault</text>
  <text x="118" y="172" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="22" fill="#a78bfa">📝</text>
  <text x="56" y="205" font-family="'Courier New',monospace" font-size="11" fill="#6e7681">notes/</text>
  <text x="56" y="220" font-family="'Courier New',monospace" font-size="11" fill="#8b949e">  ideas.md</text>
  <text x="56" y="235" font-family="'Courier New',monospace" font-size="11" fill="#8b949e">  project.md</text>
  <text x="56" y="250" font-family="'Courier New',monospace" font-size="11" fill="#8b949e">  daily/</text>
  <text x="56" y="265" font-family="'Courier New',monospace" font-size="11" fill="#6e7681">quartz.config.ts</text>
  <text x="56" y="280" font-family="'Courier New',monospace" font-size="11" fill="#6e7681">content/</text>
  <rect x="56" y="350" width="123" height="24" rx="8" fill="#2d1f4e"/>
  <text x="118" y="367" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#a78bfa">로컬 Vault</text>

  <!-- 화살표 1→2 -->
  <line x1="196" y1="250" x2="220" y2="250" stroke="#0891b2" stroke-width="2" marker-end="url(#arrP)"/>

  <!-- STEP 2: git add · commit -->
  <rect x="222" y="115" width="155" height="270" rx="12" fill="#1a0505" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="222" y="115" width="155" height="38" rx="12" fill="#7f1d1d" opacity="0.6"/>
  <text x="300" y="140" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="12" font-weight="700" fill="#f87171">git add · commit</text>
  <text x="300" y="172" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="22" fill="#f87171">📦</text>
  <text x="238" y="205" font-family="'Courier New',monospace" font-size="10.5" fill="#fca5a5">$ git add .</text>
  <text x="238" y="222" font-family="'Courier New',monospace" font-size="10.5" fill="#fca5a5">$ git commit \</text>
  <text x="238" y="237" font-family="'Courier New',monospace" font-size="10.5" fill="#fca5a5">  -m "update"</text>
  <text x="238" y="265" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#8b949e">변경 이력 저장</text>
  <text x="238" y="283" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#8b949e">롤백 가능</text>
  <rect x="238" y="350" width="123" height="24" rx="8" fill="#2d0a0a"/>
  <text x="300" y="367" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#f87171">로컬 커밋</text>

  <!-- 화살표 2→3 -->
  <line x1="378" y1="250" x2="402" y2="250" stroke="#0891b2" stroke-width="2" marker-end="url(#arrP)"/>

  <!-- STEP 3: git push (GitHub) -->
  <rect x="404" y="115" width="155" height="270" rx="12" fill="#0a1628" stroke="#388bfd" stroke-width="1.5"/>
  <rect x="404" y="115" width="155" height="38" rx="12" fill="#1a3a6e" opacity="0.7"/>
  <text x="482" y="140" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="12" font-weight="700" fill="#79c0ff">git push</text>
  <text x="482" y="172" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="22" fill="#79c0ff">☁️</text>
  <text x="420" y="205" font-family="'Courier New',monospace" font-size="10.5" fill="#79c0ff">$ git push \</text>
  <text x="420" y="220" font-family="'Courier New',monospace" font-size="10.5" fill="#79c0ff">  origin main</text>
  <text x="420" y="248" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#8b949e">GitHub 원격 저장</text>
  <text x="420" y="266" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#8b949e">Actions 트리거</text>
  <text x="420" y="284" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#8b949e">백업 완료</text>
  <rect x="420" y="350" width="123" height="24" rx="8" fill="#0a1628"/>
  <text x="482" y="367" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#79c0ff">원격 저장소</text>

  <!-- 화살표 3→4 -->
  <line x1="560" y1="250" x2="584" y2="250" stroke="#0891b2" stroke-width="2" marker-end="url(#arrP)"/>
  <!-- Actions 화살표 (세로) -->
  <text x="572" y="214" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="9" fill="#22c55e">자동</text>

  <!-- STEP 4: GitHub Actions / Quartz Build -->
  <rect x="586" y="115" width="155" height="270" rx="12" fill="#021a1f" stroke="#0891b2" stroke-width="2"/>
  <rect x="586" y="115" width="155" height="38" rx="12" fill="#0891b2" opacity="0.4"/>
  <text x="664" y="140" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="12" font-weight="700" fill="#22d3ee">Actions · Build</text>
  <text x="664" y="172" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="22" fill="#22d3ee">⚙️</text>
  <text x="602" y="205" font-family="'Courier New',monospace" font-size="10" fill="#22d3ee">npx quartz build</text>
  <text x="602" y="222" font-family="'Courier New',monospace" font-size="10" fill="#22d3ee">--serve</text>
  <text x="602" y="248" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#8b949e">MD → HTML 변환</text>
  <text x="602" y="266" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#8b949e">그래프 데이터 생성</text>
  <text x="602" y="284" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#8b949e">검색 인덱스 빌드</text>
  <rect x="602" y="350" width="123" height="24" rx="8" fill="#021a1f"/>
  <text x="664" y="367" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#22d3ee">public/ 생성</text>

  <!-- 화살표 4→5 -->
  <line x1="742" y1="250" x2="766" y2="250" stroke="#22c55e" stroke-width="2" marker-end="url(#arrPG)"/>

  <!-- STEP 5: 정적 사이트 -->
  <rect x="768" y="115" width="155" height="270" rx="12" fill="#021a0d" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="768" y="115" width="155" height="38" rx="12" fill="#14532d" opacity="0.6"/>
  <text x="846" y="140" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="12" font-weight="700" fill="#4ade80">정적 파일 생성</text>
  <text x="846" y="172" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="22" fill="#4ade80">📄</text>
  <text x="784" y="205" font-family="'Courier New',monospace" font-size="11" fill="#4ade80">public/</text>
  <text x="784" y="220" font-family="'Courier New',monospace" font-size="11" fill="#6e7681">  index.html</text>
  <text x="784" y="235" font-family="'Courier New',monospace" font-size="11" fill="#6e7681">  graph.json</text>
  <text x="784" y="250" font-family="'Courier New',monospace" font-size="11" fill="#6e7681">  static/</text>
  <text x="784" y="280" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#8b949e">CDN 최적화 준비</text>
  <rect x="784" y="350" width="123" height="24" rx="8" fill="#021a0d"/>
  <text x="846" y="367" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#4ade80">배포 준비 완료</text>

  <!-- 화살표 5→6 -->
  <line x1="924" y1="250" x2="948" y2="250" stroke="#22c55e" stroke-width="2" marker-end="url(#arrPG)"/>

  <!-- STEP 6: 웹 공개 -->
  <rect x="950" y="105" width="205" height="290" rx="12" fill="#021a1f" stroke="#0891b2" stroke-width="2.5"/>
  <rect x="950" y="105" width="205" height="40" rx="12" fill="#0891b2" opacity="0.5"/>
  <!-- 공개 뱃지 -->
  <rect x="1008" y="94" width="90" height="20" rx="10" fill="#22c55e"/>
  <text x="1053" y="108" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="10" font-weight="700" fill="#fff">🌐 공개 완료</text>
  <text x="1053" y="132" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="12" font-weight="700" fill="#22d3ee">웹 공개</text>
  <text x="1053" y="162" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="22" fill="#22d3ee">🌐</text>
  <text x="966" y="195" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#a5f3fc">• GitHub Pages 자동 배포</text>
  <text x="966" y="213" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#a5f3fc">• Cloudflare Pages 연결</text>
  <text x="966" y="231" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#a5f3fc">• 커스텀 도메인 설정</text>
  <text x="966" y="249" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#a5f3fc">• HTTPS 자동 적용</text>
  <text x="966" y="267" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#a5f3fc">• 노트 그래프 탐색</text>
  <text x="966" y="285" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#a5f3fc">• 전문 검색 가능</text>
  <rect x="966" y="352" width="173" height="24" rx="8" fill="#021a1f"/>
  <text x="1053" y="369" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="11" fill="#22d3ee">지식 자산 공개</text>

  <!-- 타임라인 바 (하단) -->
  <rect x="40" y="418" width="1115" height="36" rx="8" fill="#161b22"/>
  <text x="300" y="441" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="12" fill="#6e7681">⏱ 최초 설정: ~1시간</text>
  <line x1="520" y1="425" x2="520" y2="445" stroke="#30363d" stroke-width="1"/>
  <text x="700" y="441" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="12" fill="#6e7681">반복 작업: git push 한 번</text>
  <line x1="880" y1="425" x2="880" y2="445" stroke="#30363d" stroke-width="1"/>
  <text x="1010" y="441" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="12" fill="#0891b2">배포: 자동 (~1분)</text>

  <!-- 하단 안내 -->
  <text x="600" y="490" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="13" fill="#6e7681">push 한 번으로 노트가 전 세계에 공개됩니다. CI/CD가 나머지를 처리합니다.</text>
  <line x1="60" y1="510" x2="1140" y2="510" stroke="#21262d" stroke-width="1"/>
  <text x="600" y="540" text-anchor="middle"
        font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="12" fill="#30363d">Allen · privatelabs.io</text>
</svg>

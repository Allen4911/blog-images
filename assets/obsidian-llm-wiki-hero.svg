<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="obsidianGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="claudeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mdGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" fill="url(#bgGrad)"/>

  <!-- Grid lines (subtle) -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
    <line x1="1000" y1="0" x2="1000" y2="500"/>
  </g>

  <!-- Decorative circles (knowledge nodes) -->
  <circle cx="100" cy="80" r="40" fill="#7c3aed" opacity="0.15"/>
  <circle cx="1100" cy="420" r="60" fill="#f59e0b" opacity="0.1"/>
  <circle cx="600" cy="480" r="80" fill="#06b6d4" opacity="0.08"/>

  <!-- Connection lines (knowledge graph feel) -->
  <g opacity="0.2" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,4">
    <line x1="150" y1="150" x2="300" y2="230"/>
    <line x1="300" y1="230" x2="500" y2="180"/>
    <line x1="500" y1="180" x2="700" y2="250"/>
    <line x1="700" y1="250" x2="900" y2="200"/>
    <line x1="150" y1="350" x2="400" y2="300"/>
    <line x1="400" y1="300" x2="700" y2="250"/>
  </g>
  <g opacity="0.15" fill="#7c3aed">
    <circle cx="150" cy="150" r="4"/>
    <circle cx="300" cy="230" r="4"/>
    <circle cx="500" cy="180" r="4"/>
    <circle cx="700" cy="250" r="4"/>
    <circle cx="900" cy="200" r="4"/>
    <circle cx="150" cy="350" r="4"/>
    <circle cx="400" cy="300" r="4"/>
  </g>

  <!-- Main Title -->
  <text x="600" y="160" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="48" font-weight="700" fill="#ffffff" filter="url(#softglow)">Obsidian + Claude Code</text>
  <text x="600" y="220" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="48" font-weight="700" fill="#ffffff">+ Markdown + Git</text>

  <!-- Subtitle -->
  <text x="600" y="278" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" fill="#a5b4fc" font-weight="400">The Persistent LLM Wiki Stack</text>

  <!-- Tool badges -->
  <g transform="translate(600, 330)">
    <!-- Obsidian badge -->
    <rect x="-430" y="-24" width="170" height="48" rx="24" fill="url(#obsidianGrad)" opacity="0.9"/>
    <text x="-345" y="5" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="600" fill="#ffffff">◆ Obsidian</text>

    <!-- Markdown badge -->
    <rect x="-240" y="-24" width="170" height="48" rx="24" fill="url(#mdGrad)" opacity="0.9"/>
    <text x="-155" y="5" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="600" fill="#ffffff"># Markdown</text>

    <!-- Claude badge -->
    <rect x="-50" y="-24" width="200" height="48" rx="24" fill="url(#claudeGrad)" opacity="0.9"/>
    <text x="50" y="5" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="600" fill="#ffffff">⚡ Claude Code</text>

    <!-- Git badge -->
    <rect x="170" y="-24" width="140" height="48" rx="24" fill="url(#gitGrad)" opacity="0.9"/>
    <text x="240" y="5" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="600" fill="#ffffff">⎇ Git</text>
  </g>

  <!-- Bottom tagline -->
  <text x="600" y="430" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="17" fill="#64748b">Raw Docs  →  Markdown  →  AI Compilation  →  Persistent Wiki</text>
</svg>

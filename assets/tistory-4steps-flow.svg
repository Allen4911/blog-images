<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <marker id="arr4s" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0.5 L0,7.5 L8,4 z" fill="#007AFF"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1200" height="4" fill="#007AFF"/>

  <!-- Title -->
  <text x="600" y="54" text-anchor="middle"
        font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="26" font-weight="700" fill="#1D1D1F">파이프라인 4단계 흐름</text>
  <text x="600" y="82" text-anchor="middle"
        font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="13" fill="#6E6E73">마크다운 &#8594; 이미지 호스팅 &#8594; MD 변환 &#8594; 에디터 주입 &#8594; 사람 검토·발행</text>

  <line x1="60" y1="102" x2="1140" y2="102" stroke="#E5E5EA" stroke-width="1"/>

  <!-- STEP 1: GitHub 이미지 호스팅 -->
  <!-- Step badge -->
  <circle cx="133" cy="130" r="20" fill="#007AFF"/>
  <text x="133" y="135" text-anchor="middle"
        font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="14" font-weight="700" fill="#FFFFFF">1</text>

  <rect x="66" y="152" width="234" height="268" rx="14" fill="#F5F8FF" stroke="#007AFF" stroke-width="1.5"/>
  <rect x="66" y="152" width="234" height="48" rx="14" fill="#007AFF" opacity="0.1"/>
  <text x="183" y="181" text-anchor="middle"
        font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="14" font-weight="700" fill="#0040CC">GitHub 이미지 호스팅</text>

  <!-- GitHub icon (simple) -->
  <circle cx="183" cy="228" r="28" fill="#FFFFFF" stroke="#007AFF" stroke-width="1.5"/>
  <text x="183" y="234" text-anchor="middle"
        font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="12" font-weight="700" fill="#007AFF">GitHub</text>

  <text x="183" y="278" text-anchor="middle"
        font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="12" fill="#1D1D1F">public 저장소 필수</text>
  <text x="183" y="298" text-anchor="middle"
        font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="11" fill="#6E6E73">assets/ 경로에 이미지 push</text>
  <line x1="86" y1="312" x2="280" y2="312" stroke="#E5E5EA" stroke-width="1"/>
  <text x="183" y="328" text-anchor="middle"
        font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="11" fill="#6E6E73">raw.githubusercontent.com/</text>
  <text x="183" y="344" text-anchor="middle"
        font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="10" fill="#AEAEB2">&#60;user&#62;/&#60;repo&#62;/main/assets/</text>
  <rect x="90" y="380" width="156" height="28" rx="8" fill="#EBF3FF"/>
  <text x="168" y="399" text-anchor="middle"
        font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="11" fill="#007AFF">curl 200 응답 검증</text>

  <!-- Arrow 1→2 -->
  <line x1="302" y1="286" x2="336" y2="286" stroke="#007AFF" stroke-width="2" marker-end="url(#arr4s)"/>

  <!-- STEP 2: MD 변환 -->
  <circle cx="416" cy="130" r="20" fill="#AF52DE"/>
  <text x="416" y="135" text-anchor="middle"
        font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="14" font-weight="700" fill="#FFFFFF">2</text>

  <rect x="339" y="152" width="234" height="268" rx="14" fill="#FBF5FF" stroke="#AF52DE" stroke-width="1.5"/>
  <rect x="339" y="152" width="234" height="48" rx="14" fill="#AF52DE" opacity="0.1"/>
  <text x="456" y="181" text-anchor="middle"
        font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="14" font-weight="700" fill="#7B2AC0">MD 변환</text>

  <rect x="356" y="210" width="200" height="156" rx="10" fill="#FFFFFF" stroke="#E5E5EA" stroke-width="1"/>
  <text x="456" y="233" text-anchor="middle"
        font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="12" font-weight="600" fill="#AF52DE">처리 순서</text>
  <text x="369" y="255" font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="11" fill="#1D1D1F">① 프론트매터 제거</text>
  <text x="369" y="273" font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="11" fill="#1D1D1F">② 이미지 URL 치환</text>
  <text x="380" y="291" font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="10" fill="#6E6E73">상대 &#8594; GitHub raw URL</text>
  <text x="369" y="309" font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="11" fill="#1D1D1F">③ 제목 추출</text>
  <text x="380" y="327" font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="10" fill="#6E6E73">코드블록 제거 &#8594; H1~H6 매칭</text>
  <text x="369" y="357" font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="11" fill="#1D1D1F">④ HTML 변환 (markdown-it)</text>

  <rect x="363" y="380" width="156" height="28" rx="8" fill="#F5EBFF"/>
  <text x="441" y="399" text-anchor="middle"
        font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="11" fill="#AF52DE">HTML 문자열 출력</text>

  <!-- Arrow 2→3 -->
  <line x1="575" y1="286" x2="609" y2="286" stroke="#007AFF" stroke-width="2" marker-end="url(#arr4s)"/>

  <!-- STEP 3: Playwright 주입 -->
  <circle cx="689" cy="130" r="20" fill="#FF9500"/>
  <text x="689" y="135" text-anchor="middle"
        font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="14" font-weight="700" fill="#FFFFFF">3</text>

  <rect x="612" y="152" width="234" height="268" rx="14" fill="#FFFAF2" stroke="#FF9500" stroke-width="1.5"/>
  <rect x="612" y="152" width="234" height="48" rx="14" fill="#FF9500" opacity="0.1"/>
  <text x="729" y="181" text-anchor="middle"
        font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="14" font-weight="700" fill="#B35800">Playwright 주입</text>

  <rect x="628" y="210" width="200" height="156" rx="10" fill="#FFFFFF" stroke="#E5E5EA" stroke-width="1"/>
  <text x="728" y="233" text-anchor="middle"
        font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="12" font-weight="600" fill="#FF9500">에디터 주입 순서</text>
  <text x="641" y="255" font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="11" fill="#1D1D1F">쿠키 로드 &#8594; 페이지 이동</text>
  <text x="641" y="273" font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="11" fill="#1D1D1F">TinyMCE 초기화 대기</text>
  <text x="641" y="291" font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="11" fill="#1D1D1F">제목 주입 (native setter)</text>
  <text x="641" y="309" font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="11" fill="#1D1D1F">본문 주입 (setContent)</text>
  <text x="641" y="327" font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="11" fill="#1D1D1F">카테고리 · 태그 설정</text>
  <text x="641" y="357" font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="11" fill="#1D1D1F">스크린샷 저장 · 창 유지</text>

  <rect x="636" y="380" width="156" height="28" rx="8" fill="#FFF3E0"/>
  <text x="714" y="399" text-anchor="middle"
        font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="11" fill="#FF9500">에디터 채움 완료</text>

  <!-- Arrow 3→4 -->
  <line x1="848" y1="286" x2="882" y2="286" stroke="#007AFF" stroke-width="2" marker-end="url(#arr4s)"/>

  <!-- STEP 4: 사람 검토 후 발행 -->
  <circle cx="962" cy="130" r="20" fill="#34C759"/>
  <text x="962" y="135" text-anchor="middle"
        font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="14" font-weight="700" fill="#FFFFFF">4</text>

  <rect x="885" y="152" width="249" height="268" rx="14" fill="#F5FFF7" stroke="#34C759" stroke-width="2"/>
  <rect x="885" y="152" width="249" height="48" rx="14" fill="#34C759" opacity="0.12"/>
  <text x="1010" y="181" text-anchor="middle"
        font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="14" font-weight="700" fill="#1A7A35">사람 검토 후 발행</text>

  <!-- Human review illustration -->
  <rect x="900" y="210" width="220" height="80" rx="10" fill="#FFFFFF" stroke="#E5E5EA" stroke-width="1"/>
  <text x="1010" y="238" text-anchor="middle"
        font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="12" font-weight="600" fill="#34C759">의도적 안전장치</text>
  <text x="1010" y="258" text-anchor="middle"
        font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="11" fill="#6E6E73">자동화는 발행 버튼을 누르지 않음</text>
  <text x="1010" y="278" text-anchor="middle"
        font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="11" fill="#6E6E73">창이 열린 채 사람이 검토</text>

  <text x="900" y="313" font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="11" fill="#1D1D1F">&#10003; 제목 · 본문 확인</text>
  <text x="900" y="331" font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="11" fill="#1D1D1F">&#10003; 이미지 표시 확인</text>
  <text x="900" y="349" font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="11" fill="#1D1D1F">&#10003; 카테고리 · 태그 확인</text>
  <text x="900" y="368" font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="11" fill="#1D1D1F">&#8594; "완료" 버튼으로 직접 발행</text>

  <rect x="904" y="380" width="170" height="28" rx="8" fill="#E8F9EC"/>
  <text x="989" y="399" text-anchor="middle"
        font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="11" fill="#1A7A35">티스토리 공개 발행</text>

  <!-- Footer -->
  <line x1="60" y1="434" x2="1140" y2="434" stroke="#E5E5EA" stroke-width="1"/>
  <text x="600" y="460" text-anchor="middle"
        font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="12" fill="#6E6E73">이미지 호스팅(2분) &#183; 스크립트 자동 실행 &#183; 검토 후 발행(2~3분) — 총 5분 이내</text>
  <text x="600" y="482" text-anchor="middle"
        font-family="'Noto Sans CJK KR', 'Noto Sans KR', sans-serif"
        font-size="11" fill="#AEAEB2">Allen · privatelabs.io</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" width="1100" height="520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="rawGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#374151"/>
      <stop offset="100%" style="stop-color:#1f2937"/>
    </linearGradient>
    <linearGradient id="mdGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0e7490"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b45309"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="wikiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5b21b6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#475569"/>
    </marker>
    <marker id="arrowhead-gold" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="520" fill="url(#bg)" rx="16"/>
  <rect width="1100" height="520" fill="none" stroke="#1e293b" stroke-width="2" rx="16"/>

  <!-- Title -->
  <text x="550" y="45" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">The LLM Wiki Processing Flow</text>
  <text x="550" y="68" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#64748b">Raw information enters on the left. Compiled knowledge exits on the right.</text>

  <!-- ── STAGE 1: Raw Docs ── -->
  <rect x="30" y="95" width="200" height="340" rx="12" fill="url(#rawGrad)" stroke="#374151" stroke-width="1.5"/>
  <text x="130" y="122" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="700" fill="#9ca3af" letter-spacing="2">STAGE 1</text>
  <text x="130" y="146" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="700" fill="#f9fafb">Raw Docs</text>
  <line x1="60" y1="160" x2="200" y2="160" stroke="#374151" stroke-width="1"/>

  <!-- Raw doc items -->
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="#d1d5db">
    <text x="65" y="190">📄  PDFs</text>
    <text x="65" y="220">🎬  YouTube summaries</text>
    <text x="65" y="250">💬  Claude chats</text>
    <text x="65" y="280">📝  Dev logs</text>
    <text x="65" y="310">🔬  Research notes</text>
    <text x="65" y="340">📊  Meeting notes</text>
    <text x="65" y="370">🌐  Web articles</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="240" y1="265" x2="295" y2="265" stroke="#475569" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="268" y="258" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#64748b">dump</text>

  <!-- ── STAGE 2: Markdown ── -->
  <rect x="305" y="95" width="185" height="340" rx="12" fill="url(#mdGrad)" stroke="#0891b2" stroke-width="1.5"/>
  <text x="397" y="122" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="700" fill="#a5f3fc" letter-spacing="2">STAGE 2</text>
  <text x="397" y="146" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="700" fill="#f9fafb">Markdown</text>
  <line x1="330" y1="160" x2="465" y2="160" stroke="#0891b2" stroke-width="1" opacity="0.4"/>

  <g font-family="'Courier New', monospace" font-size="12" fill="#a5f3fc">
    <text x="325" y="188"># Concept Title</text>
    <text x="325" y="210">## Key Points</text>
    <text x="325" y="232">- idea one</text>
    <text x="325" y="254">- idea two</text>
    <text x="325" y="276"></text>
    <text x="325" y="298">[[linked-note]]</text>
    <text x="325" y="320">#tag #topic</text>
    <text x="325" y="342"></text>
    <text x="325" y="364" font-size="11" fill="#67e8f9">Plain text.</text>
    <text x="325" y="383" font-size="11" fill="#67e8f9">Always readable.</text>
    <text x="325" y="402" font-size="11" fill="#67e8f9">AI-native format.</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="500" y1="265" x2="555" y2="265" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowhead-gold)"/>
  <text x="528" y="255" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#f59e0b">process</text>

  <!-- ── STAGE 3: AI Compilation ── -->
  <rect x="565" y="95" width="210" height="340" rx="12" fill="url(#aiGrad)" stroke="#d97706" stroke-width="1.5"/>
  <text x="670" y="122" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="700" fill="#fde68a" letter-spacing="2">STAGE 3</text>
  <text x="670" y="146" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="700" fill="#f9fafb">AI Compilation</text>
  <line x1="590" y1="160" x2="750" y2="160" stroke="#d97706" stroke-width="1" opacity="0.4"/>

  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#fef3c7">
    <text x="585" y="190">⚡  Summarize</text>
    <text x="585" y="220">🔍  Extract concepts</text>
    <text x="585" y="250">🔗  Add [[links]]</text>
    <text x="585" y="280">✏️   Update existing</text>
    <text x="585" y="310">🆕  Create new notes</text>
    <text x="585" y="340">🏷️   Apply #tags</text>
    <text x="585" y="370">💾  git commit</text>
  </g>
  <rect x="580" y="385" width="180" height="32" rx="6" fill="#92400e" opacity="0.6"/>
  <text x="670" y="406" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#fbbf24">Claude Code agent</text>

  <!-- Arrow 3→4 -->
  <line x1="785" y1="265" x2="840" y2="265" stroke="#475569" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="813" y="255" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#64748b">persist</text>

  <!-- ── STAGE 4: Persistent Wiki ── -->
  <rect x="850" y="95" width="215" height="340" rx="12" fill="url(#wikiGrad)" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="957" y="122" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="700" fill="#c4b5fd" letter-spacing="2">STAGE 4</text>
  <text x="957" y="146" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="700" fill="#f9fafb">Persistent Wiki</text>
  <line x1="875" y1="160" x2="1040" y2="160" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>

  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#ede9fe">
    <text x="870" y="190">🧠  Linked knowledge</text>
    <text x="870" y="220">📈  Grows over time</text>
    <text x="870" y="250">🔄  Self-updating</text>
    <text x="870" y="280">🔍  Searchable graph</text>
    <text x="870" y="310">⎇   Version history</text>
    <text x="870" y="340">🌐  Cross-machine sync</text>
    <text x="870" y="370">♾️   No session limits</text>
  </g>
  <rect x="865" y="385" width="185" height="32" rx="6" fill="#3730a3" opacity="0.6"/>
  <text x="957" y="406" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#a5b4fc">Obsidian vault + Git</text>

  <!-- Bottom feedback arrow (wiki feeds back into AI) -->
  <path d="M 957 445 Q 957 480 550 480 Q 143 480 143 445" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <polygon points="143,445 139,456 147,456" fill="#7c3aed" opacity="0.5"/>
  <text x="550" y="497" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#7c3aed" opacity="0.7">Wiki feeds back into future AI sessions — knowledge compounds</text>
</svg>

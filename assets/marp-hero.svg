<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="mdGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="cliGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="pdfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b91c1c"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="pptGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c2410c"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="htmlGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="softglow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="500" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/><line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/><line x1="800" y1="0" x2="800" y2="500"/>
    <line x1="1000" y1="0" x2="1000" y2="500"/>
  </g>

  <!-- Decorative slide cards (floating) -->
  <g opacity="0.12">
    <rect x="80" y="70" width="120" height="74" rx="8" fill="#06b6d4"/>
    <rect x="1000" y="350" width="140" height="86" rx="8" fill="#a855f7"/>
    <rect x="120" y="360" width="100" height="62" rx="8" fill="#f59e0b"/>
  </g>

  <!-- Main Title -->
  <text x="600" y="150" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="64" font-weight="700" fill="#ffffff" filter="url(#softglow)">Marp</text>
  <text x="600" y="208" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="40" font-weight="700" fill="#67e8f9">Markdown <tspan fill="#94a3b8">→</tspan> Slides</text>

  <!-- Subtitle -->
  <text x="600" y="256" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" fill="#a5b4fc" font-weight="400">마크다운으로 슬라이드를 쓰고, PDF·PPTX·HTML로 내보내기</text>

  <!-- Format badges -->
  <g transform="translate(600, 320)" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600" font-size="16" fill="#ffffff">
    <rect x="-300" y="-24" width="150" height="48" rx="24" fill="url(#mdGrad)" opacity="0.92"/>
    <text x="-225" y="5" text-anchor="middle"># Markdown</text>
    <rect x="-135" y="-24" width="150" height="48" rx="24" fill="url(#cliGrad)" opacity="0.92"/>
    <text x="-60" y="5" text-anchor="middle">⚙ marp-cli</text>
    <rect x="30" y="-24" width="80" height="48" rx="24" fill="url(#pdfGrad)" opacity="0.92"/>
    <text x="70" y="5" text-anchor="middle">PDF</text>
    <rect x="120" y="-24" width="90" height="48" rx="24" fill="url(#pptGrad)" opacity="0.92"/>
    <text x="165" y="5" text-anchor="middle">PPTX</text>
    <rect x="220" y="-24" width="90" height="48" rx="24" fill="url(#htmlGrad)" opacity="0.92"/>
    <text x="265" y="5" text-anchor="middle">HTML</text>
  </g>

  <!-- Bottom tagline -->
  <text x="600" y="420" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="17" fill="#64748b">하나의 마크다운 파일  →  어떤 포맷의 슬라이드든</text>
</svg>
